<!doctype html>
<html lang="en" prefix="zotero: http://www.zotero.org/namespaces/export#">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if title %}{{ title | escape }}{% else %}{{ site.title | escape }}{% endif %} | {{ site.title }} </title>
    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
    <!-- Preload LCP hero background image -->
    <link rel="preload" as="image" href="/assets/images/hero-background.webp" fetchpriority="high">
    <link rel="me" href="https://proven.lol/0c8828">
    {%- include "feed-meta.html" -%}
    {%- include "seo.html" -%}
    {%- include "dublin-core.html" -%}
    {%- include "schema-jsonld.html" -%}
    {%- include "zotero.html" -%}
<meta content='{{image}}' name='twitter:image'/>
<meta content='{{image}}' name='facebook:image'/>
<meta content='{{site.social.facebook}}' property='facebook:author'/>
<meta content='{{description}}' property='facebook:description'/>
<meta content='{{description}}' name='twitter:description'/>
<meta content='index, follow' name='robots'/>
<meta content='{{site.social.twitter}}' property='twitter:author'/>
<meta content='{{site.social.twitter}}' name='twitter:site'/>
<!-- Favicons -->
<link rel=“icon” href=”/favicon.ico” type=“image/x-icon”>
<link rel=“shortcut icon” href=“/favicon.ico” type=“image/x-icon”>

<link rel="icon" type="image/png" sizes="144x144" href="/assets/images/favicon-144x144.png">
<link rel="icon" type="image/png" sizes="96x96" href="/assets/images/favicon-96x96.png">

<link rel="manifest" href="/site.webmanifest">
<link rel="mask-icon" href="/assets/images/safari-pinned-tab.svg" color="#000000">

<meta name="msapplication-config" content="/browserconfig.xml">
<meta name="theme-color" content="#ffffff">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/rss.xml" | prepend: site.baseurl | prepend: site.url }}">
<!-- Google Analytics (deferred) -->
<script>
  window.addEventListener('load', function() {
    var s = document.createElement('script');
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-2ESPRQ6C54';
    s.async = true;
    document.head.appendChild(s);
    s.onload = function() {
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2ESPRQ6C54');
    };
  });
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" media="print" onload="this.media='all'"/>

name: Deploy 11ty to Cloudflare Workers

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PDF verification tools
        run: sudo apt-get update && sudo apt-get install -y ghostscript poppler-utils qpdf

      - name: Build and check 11ty site
        run: npm test

      - name: Verify build output
        run: |
          if [ ! -d _site ]; then
            echo "_site directory missing after build" >&2
            exit 1
          fi
          echo "Built $(find _site -type f | wc -l) files"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
